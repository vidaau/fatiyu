<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Universe ❤️</title>
    <style>
        :root {
            --soft-pink: #ffc2d1;
            --deep-rose: #fb6f92;
        }

        body {
            margin: 0;
            font-family: 'Georgia', serif;
            background: #0f0c29;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: manipulation;
        }

        canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
        }

        #content {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 85%;
            max-width: 380px;
            max-height: 95vh; /* Sedikit ditinggikan agar lebih fleksibel */
            padding: 15px; /* Padding dikurangi sedikit agar konten lebih naik */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .photo-frame {
            background: white;
            padding: 8px 8px 20px 8px; /* Padding frame dikurangi */
            border-radius: 5px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            transform: rotate(-2deg);
            margin: 5px auto; /* Margin atas bawah dikurangi */
            max-width: 100px; /* --- FOTO DIKECILKAN SIGNIFICAN --- */
            flex-shrink: 0;
        }

        .photo-frame img {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid #eee;
        }

        h1 { font-style: italic; color: var(--soft-pink); font-size: 1.3rem; margin: 8px 0; }
        
        #typing-container {
            overflow-y: auto;
            margin: 8px 0;
            padding-right: 5px;
            max-height: 160px; /* Disesuaikan agar sisa ruang untuk tombol lega */
            flex-grow: 1;
            scrollbar-width: thin;
            scrollbar-color: var(--soft-pink) transparent;
        }

        #typing {
            font-size: 0.85rem; /* Ukuran font teks sedikit dikecilkan */
            line-height: 1.5;
            color: #f8edeb;
            text-align: left;
            white-space: pre-line;
        }

        /* Scrollbar Styling */
        #typing-container::-webkit-scrollbar { width: 3px; }
        #typing-container::-webkit-scrollbar-thumb { background: var(--soft-pink); border-radius: 10px; }

        .game-heart {
            position: absolute;
            font-size: 35px;
            cursor: pointer;
            z-index: 5;
            filter: drop-shadow(0 0 8px var(--deep-rose));
            user-select: none;
            transition: transform 0.1s;
        }

        button {
            padding: 10px 20px; /* Padding tombol dikurangi sedikit */
            border-radius: 20px;
            border: none;
            background: var(--deep-rose);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(251, 111, 146, 0.4);
            margin-top: 8px;
            flex-shrink: 0;
            font-size: 0.9rem;
        }

        button:hover { transform: scale(1.05); background: #ff4d79; }

        #message { 
            display: none; 
            flex-direction: column; 
            overflow: hidden;
            align-items: center; /* Memastikan semua elemen di tengah */
        }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<audio id="bgm" src="musik.mp3" loop preload="auto"></audio>
<audio id="popSfx" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>

<div id="content">
    <div id="game-intro">
        <h1>Catch my hearts, Fatih... ✨</h1>
        <p id="scoreText">Collected: 0 / 5</p>
        <p style="font-size: 11px; opacity: 0.7;">(Tap hearts to start the music!)</p>
    </div>

    <div id="message">
        <div class="photo-frame">
            <img src="foto.jpeg" alt="Us">
        </div>
        <div id="typing-container">
            <div id="typing"></div>
        </div>
        <button id="loveBtn" onclick="loveBack()">I love you ❤️</button>
    </div>
</div>

<script>
// --- BACKGROUND ---
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");
let particles = [];
function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', initCanvas);
initCanvas();

function createParticle() {
    return { x: Math.random() * canvas.width, y: canvas.height + 10, size: Math.random() * 2 + 1, speed: Math.random() * 0.5 + 0.2, opacity: Math.random() * 0.5 };
}
for(let i=0; i<60; i++) particles.push(createParticle());

function drawBg() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.fillStyle = "white";
    particles.forEach(p => {
        ctx.globalAlpha = p.opacity; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        p.y -= p.speed; if(p.y < -10) p.y = canvas.height + 10;
    });
    requestAnimationFrame(drawBg);
}
drawBg();

// --- GAME LOGIC ---
let score = 0;
let gameActive = true;
let musicStarted = false;
let spawner;
const bgm = document.getElementById("bgm");

function startSpawning() {
    spawner = setInterval(spawnHeart, 1000);
}

function spawnHeart() {
    if(!gameActive) return;
    const h = document.createElement("div");
    h.className = "game-heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random() * 80 + 10 + "vw";
    h.style.top = "-50px";
    document.body.appendChild(h);

    let pos = -50;
    let angle = 0;
    let fall = setInterval(() => {
        pos += 2.5; angle += 0.04;
        h.style.top = pos + "px";
        h.style.marginLeft = Math.sin(angle) * 20 + "px";
        if(pos > window.innerHeight) { clearInterval(fall); h.remove(); }
    }, 20);

    h.onclick = (e) => {
        e.stopPropagation();
        if(!musicStarted) { bgm.play().catch(err => {}); musicStarted = true; }
        document.getElementById("popSfx").currentTime = 0;
        document.getElementById("popSfx").play().catch(e => {});
        score++;
        document.getElementById("scoreText").innerText = `Collected: ${score} / 5`;
        h.remove();
        if(score >= 5) showSurprise();
    }
}

function showSurprise() {
    gameActive = false;
    clearInterval(spawner);
    document.getElementById("game-intro").style.display = "none";
    document.getElementById("message").style.display = "flex";

    const text = `To my dearest Fatih,\n\nIn a world where everything feels like a fleeting draft, you are the only code I’d never change. You walked into my life and suddenly, the messy syntax of my world started to make perfect sense.\n\nThank you for being the quiet strength when I’m loud, the steady ground when I’m drifting, and the stars that guide me home. I didn’t just fall for you—I found myself in you.\n\nAlways yours,\nVida.`;

    let i = 0;
    document.getElementById("typing").innerHTML = ""; 
    function typeEffect() {
        if (i < text.length) {
            document.getElementById("typing").innerHTML += text.charAt(i);
            i++;
            const container = document.getElementById("typing-container");
            container.scrollTop = container.scrollHeight;
            setTimeout(typeEffect, 50);
        }
    }
    setTimeout(typeEffect, 800);
}

function loveBack() {
    alert("I love you more than every line of code ever written! 💖✨");
    
    for(let i=0; i<30; i++) {
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.style.position = "fixed";
        heart.style.left = Math.random()*100+"vw";
        heart.style.top = Math.random()*100+"vh";
        heart.style.fontSize = "25px";
        heart.style.zIndex = "100";
        heart.style.transition = "opacity 1s";
        document.body.appendChild(heart);
        setTimeout(() => {
            heart.style.opacity = "0";
            setTimeout(() => heart.remove(), 1000);
        }, 1000);
    }

    setTimeout(resetGame, 2000);
}

function resetGame() {
    score = 0;
    gameActive = true;
    document.getElementById("scoreText").innerText = `Collected: ${score} / 5`;
    document.getElementById("message").style.display = "none";
    document.getElementById("game-intro").style.display = "block";
    startSpawning();
}

startSpawning();
</script>
</body>
</html>
